<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  body {
    background:
      radial-gradient(ellipse at top right, rgb(124 58 237 / 0.18), transparent 50%),
      radial-gradient(ellipse at bottom left, rgb(37 99 235 / 0.18), transparent 50%),
      #0f172a;
    color: #f1f5f9;
    padding: 80px 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #cbd5e1;
  }
  .mark {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    box-shadow: 0 16px 40px -12px rgb(37 99 235 / 0.55);
  }
  h1 {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1;
    color: #fff;
    margin-bottom: 24px;
  }
  h1 strong { background: linear-gradient(90deg, #60a5fa, #c4b5fd); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lead {
    font-size: 28px;
    color: #cbd5e1;
    line-height: 1.4;
    max-width: 980px;
  }
  .lead code { font-family: ui-monospace, Consolas, monospace; background: rgb(255 255 255 / 0.08); padding: 2px 10px; border-radius: 6px; font-size: 0.78em; }
  .meta {
    display: flex;
    gap: 18px;
    align-items: center;
    font-size: 18px;
    color: #94a3b8;
    font-weight: 500;
  }
  .meta .pill {
    padding: 6px 14px;
    border: 1px solid rgb(255 255 255 / 0.12);
    border-radius: 999px;
    color: #e2e8f0;
  }
  .spectrum {
    position: absolute;
    right: -20px;
    top: 60px;
    width: 320px;
    height: 320px;
    background:
      conic-gradient(from 200deg at 50% 50%,
        #fb7185, #fbbf24, #34d399, #60a5fa, #a78bfa, #fb7185);
    border-radius: 50%;
    opacity: 0.18;
    filter: blur(60px);
  }
</style>
</head>
<body>
<div class="spectrum"></div>
<div class="brand">
  <div class="mark"></div>
  casemaster-prism
</div>

<div>
  <h1>One source,<br><strong>many themes.</strong></h1>
  <p class="lead">
    Drop-in design system + variant catalogue + progressive-enhancement
    JS for CaseMaster apps. Verified on both runtimes; no
    <code>.cms</code> source changes.
  </p>
</div>

<div class="meta">
  <span class="pill">Linear · Tabler · Material</span>
  <span class="pill">~14 KB gz CSS · ~10 KB gz JS</span>
  <span class="pill">22 tests · axe clean</span>
  <span style="margin-left:auto">v0.3.0 · MIT</span>
</div>
</body>
</html>

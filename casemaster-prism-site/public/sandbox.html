<template id="demo-toasts">
  <div class="container">
    <p class="text-muted small mb-3">Click a button to fire a toast — the cms-ui frame shows the styled version, the bare frame just logs to the console.</p>
    <div class="d-flex flex-wrap" style="gap:.4rem">
      <button class="btn btn-success btn-sm" type="button" data-fire-toast='{"kind":"success","title":"Saved","message":"Inventory ADJ-2026-0419 posted."}'>Success</button>
      <button class="btn btn-info    btn-sm" type="button" data-fire-toast='{"kind":"info","title":"Heads-up","message":"Replen wave queued."}'>Info</button>
      <button class="btn btn-warning btn-sm" type="button" data-fire-toast='{"kind":"warning","title":"Low stock","message":"SKU B-221 below safety stock."}'>Warning</button>
      <button class="btn btn-danger  btn-sm" type="button" data-fire-toast='{"kind":"danger","title":"Picker offline","message":"Retrying in 30 s."}'>Danger</button>
    </div>
    <script>
      document.addEventListener('click', (ev) => {
        const t = ev.target.closest('[data-fire-toast]');
        if (!t) return;
        const data = JSON.parse(t.dataset.fireToast);
        window.dispatchEvent(new CustomEvent('cms-toast', { detail: data }));
        if (!window.cmsUi) console.log('[no cms-ui] would toast →', data);
      });
    </script>
  </div>
</template>

<!-- ─────────── .cms SOURCE TEMPLATES ───────────────
     One per demo. Shown in the ".cms" tab on the landing's
     comp-blocks. The <template> body is plain text (escaped HTML
     entities for &lt; / &gt;) so it renders verbatim as code. -->

<template id="cms-table" data-language="cms">// CaseMaster .cms — emits the BS4 table that prism themes.
inherits 'base'

function main()
    set('items',
        iterator.ofEntity(
            entities: &lt; &lt;@iterator/entity name: 'i', entity: 'wms/inventory', orderBy: '-id'&gt; &gt;,
            rows: 50
        )
    )
    page.render(
        &lt;@page/data/table iterator: [items], group: 'list'&gt;
    )
end-function</template>

<template id="cms-form" data-language="cms">// CaseMaster .cms — declarative form. Fields auto-bind to the
// business object's attribute metadata; runtime emits BS4 markup.
inherits 'base'

function main()
    page.render(
        &lt;@page/data/form
            entity: 'wms/inventory',
            fields: &lt;
                &lt;@page/data/form/field name: 'sku',            label: 'SKU'&gt;,
                &lt;@page/data/form/field name: 'warehouse',      type: 'select',   source: &lt;@iterator/entity entity: 'wms/warehouse'&gt;&gt;,
                &lt;@page/data/form/field name: 'available_from', type: 'date'&gt;,
                &lt;@page/data/form/field name: 'notes',          type: 'textarea'&gt;
            &gt;,
            actions: &lt;
                &lt;@page/button class: 'btn btn-primary',   label: 'Save changes'&gt;,
                &lt;@page/button class: 'btn btn-secondary', label: 'Cancel'&gt;
            &gt;
        &gt;
    )
end-function</template>

<template id="cms-buttons" data-language="cms">// CaseMaster .cms — button intents + sizes. The class string is
// passed verbatim to the rendered HTML, so prism's variant classes
// (btn-soft-*, btn-pill, btn-icon-only) work out of the box.
&lt;@page/button class: 'btn btn-primary',         label: 'Primary'&gt;
&lt;@page/button class: 'btn btn-secondary',       label: 'Secondary'&gt;
&lt;@page/button class: 'btn btn-success',         label: 'Success'&gt;
&lt;@page/button class: 'btn btn-warning',         label: 'Warning'&gt;
&lt;@page/button class: 'btn btn-danger',          label: 'Danger'&gt;
&lt;@page/button class: 'btn btn-link',            label: 'Link'&gt;

// Sizes
&lt;@page/button class: 'btn btn-primary btn-sm',  label: 'Small'&gt;
&lt;@page/button class: 'btn btn-primary',         label: 'Default'&gt;

<template id="cms-pagination" data-language="cms">// CaseMaster .cms — pagination is typically auto-generated by
// &lt;@page/data/table&gt; based on the iterator's total + the `pagingMode`
// option. To render manually:
&lt;@page/html
    `&lt;nav&gt;
       &lt;ul class="pagination"&gt;
         &lt;li class="page-item disabled"&gt;&lt;a class="page-link" href="#"&gt;«&lt;/a&gt;&lt;/li&gt;
         &lt;li class="page-item"&gt;&lt;a class="page-link" href="?page=1"&gt;1&lt;/a&gt;&lt;/li&gt;

&gt;

&lt;@page/data/table

<template id="cms-toolbar-table" data-language="cms">// CaseMaster .cms — same as a normal table. The toolbar (filter,
// columns, CSV) is added by prism's enhancer at runtime, NOT by the
// CaseMaster runtime. Just render any &lt;@page/data/table&gt; with at
// least 2 rows and prism enhances it automatically.
inherits 'base'

function main()
    set('orders',
        iterator.ofEntity(
            entities: &lt; &lt;@iterator/entity name: 'so', entity: 'wms/sales_order', orderBy: '-id'&gt; &gt;,
            rows: 50
        )
    )
    page.render(
        &lt;@page/data/table iterator: [orders], group: 'list'&gt;
    )
end-function</template>

<template id="cms-toasts" data-language="cms">// CaseMaster .cms — toasts are surfaced from the SERVER via response
// headers, then rendered by prism's enhancer on the client.
function save()
    bo.save([item])
    response.setHeader('X-Cms-Toast', '{"kind":"success","title":"Saved","message":"Inventory updated."}')
    response.redirect('./list')
end-function

// On the receiving page, no .cms code is needed — prism reads the
// header, shows a toast. From client-side JS:
//
//   import { showToast } from 'casemaster-prism';
//   showToast({ kind: 'warning', message: 'Low stock!' });</template>

<script>
  (function () {
    const params  = new URLSearchParams(location.search);
    const demo    = params.get('demo')    || 'table';
    const ui      = params.get('ui') === '1';
    const accent  = params.get('accent');
    const dark    = params.get('theme') === 'dark';
    const preset  = params.get('preset');   // linear | tabler | material
    const density = params.get('density');  // compact | comfortable

    if (dark)    document.documentElement.setAttribute('data-theme', 'dark');
    if (preset)  document.documentElement.setAttribute('data-cms-theme', preset);
    if (density) document.documentElement.setAttribute('data-cms-density', density);

    const tpl = document.getElementById('demo-' + demo);
    if (!tpl) {
      document.body.innerHTML = '<p style="color:#dc2626;padding:1rem">Unknown demo: ' + demo + '</p>';
      return;
    }
    document.body.appendChild(tpl.content.cloneNode(true));

    if (ui) {
      // Optional token overrides before bundle loads.
      const overrides = [];
      if (accent) overrides.push('--cms-primary:' + accent);
      const radius = params.get('radius');
      if (radius) overrides.push('--cms-radius:' + radius + 'px');
      if (overrides.length) {
        const s = document.createElement('style');
        s.textContent = ':root{' + overrides.join(';') + '}';
        document.head.appendChild(s);
      }
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = './assets/prism/prism.min.css';
      document.head.appendChild(link);

      const script = document.createElement('script');
      script.type = 'module';
      script.src = './assets/prism/prism.js';
      document.body.appendChild(script);
    }
  })();
</script>

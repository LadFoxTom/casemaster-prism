<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WMS — Inventory (cms-vercel, no cms-ui)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
<nav class="navbar navbar-light bg-primary text-light">
  <a class="navbar-brand text-light" href="/">WMS</a>
</nav>

<div class="d-flex">
  <aside class="wms-sidebar p-3" style="background:#f5f5f5;width:220px;min-height:100vh">
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link active" href="/">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/inventory">Inventory</a></li>

  <main class="flex-grow-1 p-3">
    <h2>Inventory</h2>

      <thead class="bg-primary text-light">

</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>WMS — Inventory (cms-vercel, with cms-ui)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<!-- cms-ui drop-in (Phase 1) — note the same HTML below has not changed. -->
<link rel="stylesheet" href="../dist/ui.min.css">
<style>:root { --cms-primary: #2563eb; }</style>
</head>
<body>
<nav class="navbar navbar-light bg-primary text-light">
  <a class="navbar-brand text-light" href="/">WMS</a>
  <div class="ml-auto">
    <button class="btn btn-sm btn-outline-secondary" type="button" onclick="
      const root=document.documentElement;
      root.setAttribute('data-theme', root.getAttribute('data-theme')==='dark'?'light':'dark');
    ">Toggle dark</button>
  </div>
</nav>

<div class="d-flex">
  <aside class="wms-sidebar p-3">
    <div class="sidebar-header">Operations</div>
    <ul class="nav flex-column">
      <li class="nav-item"><a class="nav-link active" href="/"><i class="fa fa-home"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/inventory"><i class="fa fa-boxes"></i> Inventory</a></li>
      <li class="nav-item"><a class="nav-link" href="/inbound"><i class="fa fa-arrow-down"></i> Inbound</a></li>
      <li class="nav-item"><a class="nav-link" href="/outbound"><i class="fa fa-arrow-up"></i> Outbound</a></li>
    </ul>
  </aside>

  <main class="flex-grow-1 p-3">
    <h2>Inventory</h2>
    <table class="cms-table table table-sm table-striped table-bordered">
      <thead class="bg-primary text-light">
        <tr>
          <th>SKU</th><th>Name</th><th>Qty</th><th>Updated</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>A-100</td><td>Widget</td><td>120</td><td>2026-05-04</td></tr>
        <tr><td>A-101</td><td>Gadget</td><td>40</td><td>2026-05-06</td></tr>
        <tr><td>B-220</td><td>Sprocket</td><td>1,400</td><td>2026-05-07</td></tr>
        <tr><td>B-221</td><td>Cog</td><td>3</td><td>2026-05-08</td></tr>
        <tr><td>C-330</td><td>Bracket</td><td>200</td><td>2026-04-30</td></tr>
      </tbody>
    </table>
  </main>
</div>

<!-- Phase 2 enhancers. Optional config first, then the script. -->
<script>window.cmsUi = { shortcuts: true, command: true };</script>
<script type="module" src="../dist/ui.js"></script>
</body>
</html>
